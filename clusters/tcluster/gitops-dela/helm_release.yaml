apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: counter
  namespace: gitops-dela
spec:
  releaseName: counter
  chart:
    spec:
      chart: ./kubernetes/chart
      sourceRef:
        kind: GitRepository
        name: counter
        namespace: gitops-dela
      version: "*"
  interval: 1m
  valuesFrom:
    - kind: ConfigMap
      name: counter-values
      valuesKey: values.yaml
